<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Haron - Interactive Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1c1815;
    font-family: 'Georgia', 'Iowan Old Style', serif;
  }

  #map {
    width: 100%;
    height: 100vh;
    background: #1c1815;
  }

  /* Nearest-neighbor upscaling instead of smooth/blurred interpolation
     when zoomed past the image's native resolution. Comment this out
     (or set PIXELATE_ON_DEEP_ZOOM to false below) if you'd rather have
     the browser's default smooth blur instead. */
  .leaflet-image-layer {
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  /* Leaflet chrome, restyled to feel like parchment/ink rather than default blue */
  .leaflet-control-zoom a {
    background: #f4ecd8;
    color: #3a2f28;
    border-color: #a8926f !important;
  }
  .leaflet-control-zoom a:hover {
    background: #e8dcc0;
  }

  .leaflet-popup-content-wrapper {
    background: #f4ecd8;
    color: #2c231b;
    border-radius: 4px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  .leaflet-popup-tip {
    background: #f4ecd8;
  }
  .marker-popup h3 {
    margin: 0 0 4px 0;
    font-size: 1.05em;
    letter-spacing: 0.02em;
    color: #6b3a1f;
  }
  .marker-popup p {
    margin: 0;
    font-size: 0.92em;
    line-height: 1.4;
  }
  .marker-popup a {
    display: inline-block;
    margin-top: 6px;
    font-size: 0.85em;
    color: #8a4a24;
  }

  /* Legend */
  .legend {
    background: #f4ecd8;
    padding: 10px 14px;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    font-size: 0.85em;
    color: #2c231b;
    line-height: 1.6;
  }
  .legend div { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .legend div.disabled { opacity: 0.35; }
  .legend .swatch {
    width: 16px;
    height: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .leaflet-div-icon.shape-marker {
    background: transparent;
    border: none;
  }

  /* Coordinate picker */
  .coord-readout {
    background: rgba(28, 24, 21, 0.85);
    color: #e8dcc0;
    padding: 6px 10px;
    border-radius: 4px;
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 0.8em;
    pointer-events: none;
    white-space: nowrap;
  }

  .picker-panel {
    background: #f4ecd8;
    color: #2c231b;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    font-size: 0.8em;
    width: 240px;
    max-height: 260px;
    display: flex;
    flex-direction: column;
  }
  .picker-panel .picker-header {
    padding: 8px 10px;
    font-weight: bold;
    border-bottom: 1px solid #a8926f;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .picker-panel .picker-header button {
    font-size: 0.85em;
    border: 1px solid #a8926f;
    background: #e8dcc0;
    border-radius: 3px;
    padding: 2px 6px;
    cursor: pointer;
  }
  .picker-panel .picker-header-buttons {
    display: flex;
    gap: 6px;
  }
  .picker-panel .picker-list {
    overflow-y: auto;
    padding: 4px 0;
  }
  .picker-panel .picker-item {
    padding: 6px 10px;
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 0.85em;
    border-bottom: 1px dashed #cbb994;
    cursor: pointer;
  }
  .picker-panel .picker-item:hover {
    background: #e8dcc0;
  }
  .picker-panel .picker-empty {
    padding: 8px 10px;
    color: #7a6b55;
    font-style: italic;
  }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

/* ============================================================
   1. MAP IMAGE
   Replace this with your own map's filename/path once ready.
   Any resolution works — bounds are calculated automatically
   below from the image's real pixel dimensions.
   ============================================================ */
const MAP_IMAGE_URL = "images/haron_topological.png";

/* ============================================================
   DEV TOOLS TOGGLE
   Set to false before sharing this page with actual users --
   the picker is a mapmaking aid, not something end users need.
   ============================================================ */
const ENABLE_COORDINATE_PICKER = true;

/* ============================================================
   2. GROUPS
   Defines marker categories: color, display label, and shape.
   Mirrors DataMaps' "groups" concept for an easy future migration.
   Supported shapes: "circle", "square", "diamond", "triangle", "star", "pin"
   ============================================================ */
const GROUPS = {
  capital: { label: "Capitals",   color: "#B4313D", shape: "star"        },
  city:    { label: "Cities",     color: "#FFB961", shape: "diamond"     },
  fort:    { label: "Fortifications", color: "#ED894E",  shape: "square" },
  town:    { label: "Towns",      color: "#FFEAAE",  shape: "circle"     },
  village: { label: "Villages",      color: "#FFFFFF",  shape: "triangle"},
  dungeon: { label: "Dungeons",   color: "#6c3483", shape: "star"        },
  poi:     { label: "Points of Interest", color: "#1e8449", shape: "pin" }
};

/* ============================================================
   3. MARKERS
   x / y are plain percentages of image width/height (0-100),
   NOT pixels. This keeps them independent of image resolution,
   so swapping in a bigger/smaller map image never breaks marker
   placement, and the values are trivial to port to DataMaps'
   own coordinate system later.

   Each marker uses its group's shape by default. Add a `shape`
   field to any marker to override that for just this one point
   (e.g. flag a special landmark with a star instead of its
   group's usual icon).
   ============================================================ */
const MARKERS = [
  { id: "m1", x: 47.6, y: 21.7, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m2", x: 43, y: 24.6, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m3", x: 35.5, y: 22.6, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m4", x: 64.5, y: 23.1, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m5", x: 56.8, y: 24.1, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m6", x: 57.5, y: 32.2, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m7", x: 57.7, y: 39.1, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m8", x: 57.4, y: 43.7, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m9", x: 50.3, y: 37.7, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m10", x: 47.1, y: 40, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m11", x: 41.5, y: 40.9, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m12", x: 36.1, y: 45.7, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m13", x: 30.8, y: 42.5, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m14", x: 29, y: 48.9, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m15", x: 41.4, y: 59.5, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m16", x: 54.9, y: 50.1, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m17", x: 59.3, y: 52.7, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m18", x: 54.6, y: 46, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m19", x: 72.6, y: 62.1, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m20", x: 74.6, y: 58.4, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m21", x: 73.7, y: 45.6, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m22", x: 71.9, y: 46.5, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m23", x: 52.1, y: 19.1, group: "capital", name: "Unnamed", description: "", link: "" },
  { id: "m24", x: 42.4, y: 82, group: "capital", name: "Unnamed", description: "", link: "" }
];

/* ============================================================
   MARKER SHAPES
   Renders a small inline SVG for each supported shape. These are
   real vector shapes (not raster images), so they stay crisp at
   any zoom level regardless of the map image's own resolution.
   ============================================================ */
function shapeSVG(shape, color, size) {
  const stroke = "#2c231b";
  const s = size || 20;
  switch (shape) {
    case "square":
      return `<svg width="${s}" height="${s}" viewBox="0 0 20 20"><rect x="2" y="2" width="16" height="16" rx="2" fill="${color}" stroke="${stroke}" stroke-width="1.6" fill-opacity="0.9"/></svg>`;
    case "diamond":
      return `<svg width="${s}" height="${s}" viewBox="0 0 20 20"><rect x="4.3" y="4.3" width="11.4" height="11.4" rx="1.5" fill="${color}" stroke="${stroke}" stroke-width="1.6" fill-opacity="0.9" transform="rotate(45 10 10)"/></svg>`;
    case "triangle":
      return `<svg width="${s}" height="${s}" viewBox="0 0 20 20"><polygon points="10,2 18,18 2,18" fill="${color}" stroke="${stroke}" stroke-width="1.6" stroke-linejoin="round" fill-opacity="0.9"/></svg>`;
    case "star":
      return `<svg width="${s}" height="${s}" viewBox="0 0 20 20"><polygon points="10,1 12.5,7 19,7.5 14,12 15.5,18.5 10,15 4.5,18.5 6,12 1,7.5 7.5,7" fill="${color}" stroke="${stroke}" stroke-width="1.3" stroke-linejoin="round" fill-opacity="0.9"/></svg>`;
    case "pin": {
      const h = s * 1.4; // pins are inherently taller than they are wide (they need a point); width still matches the other shapes
      return `<svg width="${s}" height="${h}" viewBox="0 0 20 28"><path d="M10 0C4.5 0 0 4.3 0 9.5C0 16 10 27 10 27S20 16 20 9.5C20 4.3 15.5 0 10 0Z" fill="${color}" stroke="${stroke}" stroke-width="1.4" fill-opacity="0.92"/><circle cx="10" cy="9.5" r="3.4" fill="${stroke}" fill-opacity="0.85"/></svg>`;
    }
    case "circle":
    default:
      return `<svg width="${s}" height="${s}" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="${color}" stroke="${stroke}" stroke-width="1.6" fill-opacity="0.9"/></svg>`;
  }
}

function makeShapeIcon(shape, color) {
  const isPin = shape === "pin";
  const size = 20; // shared base size across every shape
  const height = isPin ? size * 1.4 : size;
  return L.divIcon({
    className: "shape-marker",
    html: shapeSVG(shape, color, size),
    iconSize: [size, height],
    iconAnchor: isPin ? [size / 2, height] : [size / 2, size / 2],
    popupAnchor: isPin ? [0, -height + 4] : [0, -size / 2 - 2]
  });
}

/* ============================================================
   BUILD THE MAP
   ============================================================ */
const map = L.map('map', {
  crs: L.CRS.Simple,
  zoomSnap: 0,      // allow fractional zoom so the image can fit the screen EXACTLY, not rounded to the nearest whole step
  zoomDelta: 0.5,   // smaller steps for the +/- buttons since we're not snapping to whole numbers
  attributionControl: false
});

const img = new Image();
img.onload = function () {
  const w = img.naturalWidth;
  const h = img.naturalHeight;

  // Bounds in Leaflet's [y, x] pixel-space convention
  const bounds = [[0, 0], [h, w]];
  L.imageOverlay(MAP_IMAGE_URL, bounds).addTo(map);

  // With CRS.Simple and bounds defined in raw image pixels, zoom level 0 is
  // this image's native 1:1 resolution. Past that, the browser is stretching
  // pixels rather than showing new detail -- but since we render that
  // stretch as crisp nearest-neighbor (see .leaflet-image-layer CSS above)
  // rather than a blur, it's fine to allow some extra zoom for inspecting
  // detail. Raise/lower DEEP_ZOOM_LEVELS to taste, or set it to 0 to hard-cap
  // at native resolution.
  const NATIVE_ZOOM = 0;
  const DEEP_ZOOM_LEVELS = 3;
  const fitZoom = map.getBoundsZoom(bounds);
  const maxZoom = Math.max(NATIVE_ZOOM + DEEP_ZOOM_LEVELS, fitZoom);
  map.setMinZoom(fitZoom - 3);
  map.setMaxZoom(maxZoom);

  map.fitBounds(bounds);
  map.setMaxBounds(bounds);

  const layerGroups = {};
  Object.keys(GROUPS).forEach(key => {
    layerGroups[key] = L.layerGroup().addTo(map);
  });

  MARKERS.forEach(m => {
    const groupInfo = GROUPS[m.group] || { color: "#333" };
    // With CRS.Simple, lat/lng ARE pixel coordinates directly (lat = row
    // from bottom, lng = column from left) -- no projection math needed.
    const lat = (m.y / 100) * h;
    const lng = (m.x / 100) * w;
    const latlng = L.latLng(lat, lng);

    const marker = L.marker(latlng, {
      icon: makeShapeIcon(m.shape || groupInfo.shape || "circle", groupInfo.color)
    });

    const linkHtml = m.link ? `<a href="${m.link}">More details &rarr;</a>` : "";
    marker.bindPopup(
      `<div class="marker-popup"><h3>${m.name}</h3><p>${m.description}</p>${linkHtml}</div>`
    );

    marker.on('click', (e) => L.DomEvent.stopPropagation(e));
    marker.addTo(layerGroups[m.group]);
  });

  buildLegend(layerGroups);
  if (ENABLE_COORDINATE_PICKER) buildCoordinatePicker(w, h);
};
img.src = MAP_IMAGE_URL;

function buildCoordinatePicker(w, h) {
  const picked = [];

  // Live x/y readout that follows the cursor
  const readout = L.control({ position: 'bottomleft' });
  readout.onAdd = function () {
    const div = L.DomUtil.create('div', 'coord-readout');
    div.innerHTML = 'x: --, y: --';
    return div;
  };
  readout.addTo(map);
  const readoutEl = document.querySelector('.coord-readout');

  function toPercent(latlng) {
    const x = (latlng.lng / w) * 100;
    const y = (latlng.lat / h) * 100;
    return { x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10 };
  }

  map.on('mousemove', (e) => {
    const { x, y } = toPercent(e.latlng);
    readoutEl.innerHTML = `x: ${x}, y: ${y}`;
  });

  // Click-to-record panel
  const panel = L.control({ position: 'bottomright' });
  panel.onAdd = function () {
    const div = L.DomUtil.create('div', 'picker-panel');
    div.innerHTML = `
      <div class="picker-header">
        <span>Picked points (${picked.length})</span>
        <div class="picker-header-buttons">
          <button id="picker-copy-all">Copy all</button>
          <button id="picker-clear">Clear</button>
        </div>
      </div>
      <div class="picker-list" id="picker-list">
        <div class="picker-empty">Click the map to record a point.</div>
      </div>
    `;
    L.DomEvent.disableClickPropagation(div);
    return div;
  };
  panel.addTo(map);

  function snippetFor(pt, idx) {
    return `{ id: "m${idx}", x: ${pt.x}, y: ${pt.y}, group: "city", name: "Unnamed", description: "", link: "" }`;
  }

  function renderList() {
    const list = document.getElementById('picker-list');
    const header = document.querySelector('.picker-header span');
    header.textContent = `Picked points (${picked.length})`;
    if (picked.length === 0) {
      list.innerHTML = '<div class="picker-empty">Click the map to record a point.</div>';
      return;
    }
    list.innerHTML = '';
    picked.forEach((pt, idx) => {
      const item = document.createElement('div');
      item.className = 'picker-item';
      item.textContent = snippetFor(pt, idx + 1);
      item.title = 'Click to copy this line';
      item.onclick = () => navigator.clipboard.writeText(snippetFor(pt, idx + 1));
      list.appendChild(item);
    });
  }

  map.on('click', (e) => {
    const pt = toPercent(e.latlng);
    picked.push(pt);
    renderList();
  });

  document.addEventListener('click', (e) => {
    if (e.target && e.target.id === 'picker-copy-all') {
      const all = picked.map((pt, idx) => snippetFor(pt, idx + 1)).join(',\n');
      navigator.clipboard.writeText(all);
    }
    if (e.target && e.target.id === 'picker-clear') {
      picked.length = 0;
      renderList();
    }
  });
}

function buildLegend(layerGroups) {
  const legend = L.control({ position: 'topright' });
  legend.onAdd = function () {
    const div = L.DomUtil.create('div', 'legend');
    Object.entries(GROUPS).forEach(([key, info]) => {
      const row = document.createElement('div');
      row.innerHTML = `<span class="swatch">${shapeSVG(info.shape || "circle", info.color, 14)}</span>${info.label}`;
      row.onclick = () => {
        const layer = layerGroups[key];
        if (map.hasLayer(layer)) {
          map.removeLayer(layer);
          row.classList.add('disabled');
        } else {
          map.addLayer(layer);
          row.classList.remove('disabled');
        }
      };
      div.appendChild(row);
    });
    return div;
  };
  legend.addTo(map);
}
</script>

</body>
</html>
